<div class="glass-card login-container">
    <h2>Phone®</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Mot de passe">
    <button onclick="handleAuth()">Valider</button>
    <p id="toggle-text" onclick="toggleMode()">Pas de compte ? Créer un compte</p>
</div>

<script type="module">
    import { auth } from './app.js';
    import { signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    let isLogin = true;

    window.toggleMode = () => {
        isLogin = !isLogin;
        document.getElementById('toggle-text').innerText = isLogin ? "Pas de compte ? Créer un compte" : "Déjà un compte ? Se connecter";
    }

    window.handleAuth = async () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        try {
            if(isLogin) await signInWithEmailAndPassword(auth, e, p);
            else await createUserWithEmailAndPassword(auth, e, p);
            window.location.href = "index.html";
        } catch(err) { alert(err.message); }
    }
</script>
