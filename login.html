<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Phone® – Connexion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-header">
        <div class="auth-title">Phone®</div>
        <div class="auth-subtitle" id="auth-subtitle">Connecte-toi à ton espace.</div>
      </div>

      <form id="auth-form">
        <div>
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="exemple@mail.com" required>
        </div>

        <div>
          <label for="password">Mot de passe</label>
          <input id="password" type="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">Connexion</button>

        <div class="error-message" id="error-zone"></div>
      </form>

      <div class="auth-toggle">
        <span id="toggle-text">Pas encore de compte ?</span>
        <button type="button" id="toggle-btn">Créer un compte</button>
      </div>

    </div>
  </div>

  <!-- SCRIPT LOGIN -->
  <script type="module">
    import { submitForm } from "./app.js";

    let mode = "login";

    const form = document.getElementById("auth-form");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const errorZone = document.getElementById("error-zone");
    const toggleBtn = document.getElementById("toggle-btn");
    const toggleText = document.getElementById("toggle-text");
    const submitBtn = document.getElementById("submit-btn");
    const subtitle = document.getElementById("auth-subtitle");

    function setError(msg) {
      errorZone.textContent = msg || "";
    }

    function updateMode() {
      if (mode === "login") {
        submitBtn.textContent = "Connexion";
        toggleText.textContent = "Pas encore de compte ?";
        toggleBtn.textContent = "Créer un compte";
        subtitle.textContent = "Connecte-toi à ton espace Phone®.";
      } else {
        submitBtn.textContent = "Créer un compte";
        toggleText.textContent = "Déjà un compte ?";
        toggleBtn.textContent = "Se connecter";
        subtitle.textContent = "Crée ton compte Phone®.";
      }
      setError("");
    }

    toggleBtn.addEventListener("click", () => {
      mode = mode === "login" ? "register" : "login";
      updateMode();
    });

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();
      submitForm(mode, email, password, setError);
    });

    updateMode();
  </script>

</body>
</html>
