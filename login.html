<script type="module">
  import { submitForm } from './app.js';

  let mode = "login";

  const form = document.getElementById('auth-form');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const errorZone = document.getElementById('error-zone');
  const toggleBtn = document.getElementById('toggle-btn');
  const toggleText = document.getElementById('toggle-text');
  const submitBtn = document.getElementById('submit-btn');
  const subtitle = document.getElementById('auth-subtitle');

  function setError(msg) {
    errorZone.textContent = msg || "";
  }

  function updateMode() {
    if (mode === "login") {
      submitBtn.textContent = "Connexion";
      toggleText.textContent = "Pas encore de compte ?";
      toggleBtn.textContent = "Créer un compte";
      subtitle.textContent = "Connecte-toi à ton espace Phone®.";
    } else {
      submitBtn.textContent = "Créer un compte";
      toggleText.textContent = "Déjà un compte ?";
      toggleBtn.textContent = "Se connecter";
      subtitle.textContent = "Crée ton compte Phone®.";
    }
    setError("");
  }

  toggleBtn.addEventListener('click', () => {
    mode = mode === "login" ? "register" : "login";
    updateMode();
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();
    submitForm(mode, email, password, setError);
  });

  updateMode();
</script>
