<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Messages</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <div class="sidebar">
    <h2>Contacts</h2>
    <div id="contacts-list"></div>

    <h2>Discussions</h2>
    <div id="conv-list"></div>
  </div>

  <div class="chat">
    <div class="chat-header">
      <span id="chat-target">Aucun</span>
    </div>

    <div id="messages-list" class="messages"></div>

    <form id="message-form">
      <input id="message-input" placeholder="Message..." required>
      <button type="submit">Envoyer</button>
    </form>
  </div>

</div>

<script type="module" src="messages.js"></script>
</body>
</html>
