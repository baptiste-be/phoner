<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Phone® – Messages</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="brand">
      <span class="brand-title">Phone®</span>
      <span class="brand-sub">Messages</span>
    </div>
    <button class="logout-btn" id="logout-btn">Déconnexion</button>
  </header>

  <main class="app-shell">
    <section class="card chat-wrapper">
      <div class="card-header">
        <div class="card-title">Discussion par numéro Phone®</div>
      </div>

      <form id="target-form" style="margin-bottom:8px; display:flex; gap:8px;">
        <input id="target-number" type="text" placeholder="Numéro Phone® (XX-XX-XX-XX-XX)" required>
        <button class="btn btn-ghost" type="submit">Ouvrir</button>
      </form>

      <div class="chat-messages" id="messages-list"></div>

      <form id="message-form" class="chat-input-row">
        <input id="message-input" type="text" placeholder="Écris un message..." autocomplete="off" required>
        <button type="submit" class="btn btn-primary">Envoyer</button>
      </form>
    </section>
  </main>
  
  <script type="module">
  // Ce script vient EN PLUS de messages.js
  const params = new URLSearchParams(window.location.search);
  const to = params.get("to");
  if (to) {
    const input = document.getElementById("target-number");
    input.value = to;
    const event = new Event("submit");
    document.getElementById("target-form").dispatchEvent(event);
  }
</script>


  <script type="module" src="messages.js"></script>
</body>
</html>
