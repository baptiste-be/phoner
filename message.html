<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Phone® – Messagerie</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div class="topbar-left">
    <span class="logo">Phone®</span>
    <span class="logo-sub">Messagerie</span>
  </div>
  <button class="topbar-btn" id="logout-btn">Déconnexion</button>
</header>

<main class="app-shell">

  <section class="messaging-layout">

    <!-- COLONNE GAUCHE : CONTACTS + DISCUSSIONS -->
    <aside class="sidebar">

      <div class="sidebar-section">
        <div class="sidebar-header">
          <span>Contacts</span>
        </div>
        <div class="list" id="contacts-list"></div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-header">
          <span>Discussions</span>
          <button id="new-chat-btn" class="link-btn">+ Nouveau</button>
        </div>
        <div class="list" id="conv-list"></div>
      </div>

    </aside>

    <!-- COLONNE DROITE : CHAT -->
    <section class="chat">

      <header class="chat-header">
        <div class="chat-target">
          <div class="chat-target-name" id="chat-target-name">Aucune conversation</div>
          <div class="chat-target-sub" id="chat-target-sub">Sélectionne un contact ou crée une discussion</div>
        </div>
      </header>

      <div class="chat-messages" id="messages-list"></div>

      <form id="message-form" class="chat-input-row">
        <input id="message-input" type="text" placeholder="Écris un message..." autocomplete="off" required>
        <button type="submit" class="btn-primary">Envoyer</button>
      </form>

    </section>

  </section>

</main>

<script type="module" src="messages.js"></script>

</body>
</html>
