<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Phone - Accueil</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="header">
    <h1>Phone</h1>
    <button id="logoutBtn" class="btn-secondary">Déconnexion</button>
  </header>

  <main class="main">

    <section class="user-info">
      <h2>Mon compte</h2>
      <p id="myEmail"></p>
      <p id="myPhoneNumber"></p>
    </section>

    <nav class="menu">
      <a href="calls.html" class="menu-item">Appels</a>
      <a href="contact.html" class="menu-item">Contacts</a>
      <a href="message.html" class="menu-item">Messages</a>
      <a href="history.html" class="menu-item">Historique</a>
    </nav>

    <section class="content">
      <h2>Bienvenue sur Phone</h2>
      <p>Sélectionne une section dans le menu.</p>
    </section>

  </main>

  <script type="module">
    import { checkAuth, logout, db } from "./app.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    checkAuth().then(async (user) => {
      const snap = await getDoc(doc(db, "users", user.uid));
      const data = snap.data();

      document.getElementById("myEmail").textContent =
        "Email : " + user.email;

      document.getElementById("myPhoneNumber").textContent =
        "Numéro Phone : " + (data.phoneNumber || "Non attribué");
    });

    document.getElementById("logoutBtn").onclick = logout;
  </script>

</body>
</html>
